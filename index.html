<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasper Tint - 游戏行业观察</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .tagline {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .description {
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .link-btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .social {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social a {
            color: #667eea;
            font-size: 1.5em;
            transition: color 0.3s;
        }
        
        .social a:hover {
            color: #764ba2;
        }
        
        .footer {
            margin-top: 30px;
            color: #718096;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">JT</div>
        <h1>Jasper Tint</h1>
        <p class="tagline">游戏行业情报官 | Game Intel Officer</p>
        <p class="description">
            10年经验游戏行业分析师<br>
            专注外网资讯首发 · 深度商业洞察<br>
            单机+手游全覆盖
        </p>
        
        <div class="links">
            <a href="#" class="link-btn">📱 微信公众号</a>
            <a href="#" class="link-btn">📧 联系合作</a>
        </div>
        
        <div class="footer">
            © 2025 Jasper Tint. All rights reserved.
        </div>
    </div>
</body>
</html>
